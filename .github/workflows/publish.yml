# Publish AIGP packages to npm
# Uses npm Trusted Publishing (OIDC) - no NPM_TOKEN needed
# Requires trusted publishers configured on npmjs.com for each @aigraphia/* package
# Triggered manually or on version tags

name: Publish to npm

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'npm tag (latest, beta, next)'
        required: true
        default: 'latest'
        type: choice
        options:
          - latest
          - beta
          - next
  push:
    tags:
      - 'v*.*.*'

jobs:
  publish:
    name: Publish Packages
    runs-on: ubuntu-latest
    environment: npm
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 'lts/*'
          registry-url: 'https://registry.npmjs.org'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all packages
        run: pnpm run build

      - name: Run tests
        run: pnpm test

      - name: Run integration tests
        run: node test-integration.js

      - name: Debug info
        run: |
          node --version
          npm --version
          cat ~/.npmrc 2>/dev/null || echo "No ~/.npmrc"
          echo "---"
          cat .npmrc 2>/dev/null || echo "No .npmrc"

      - name: Publish @aigraphia/protocol
        working-directory: packages/protocol
        run: npm publish --access public --provenance --tag ${{ inputs.tag || 'latest' }}

      - name: Publish @aigraphia/plugins
        working-directory: packages/plugins
        run: npm publish --access public --provenance --tag ${{ inputs.tag || 'latest' }}

      - name: Publish @aigraphia/layout
        working-directory: packages/layout
        run: npm publish --access public --provenance --tag ${{ inputs.tag || 'latest' }}

      - name: Publish @aigraphia/export
        working-directory: packages/export
        run: npm publish --access public --provenance --tag ${{ inputs.tag || 'latest' }}

      - name: Publish @aigraphia/converters
        working-directory: packages/converters
        run: npm publish --access public --provenance --tag ${{ inputs.tag || 'latest' }}

      - name: Publish @aigraphia/cli
        working-directory: packages/cli
        run: npm publish --access public --provenance --tag ${{ inputs.tag || 'latest' }}

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          body: |
            ## AIGP ${{ github.ref_name }}

            Published all @aigraphia/* packages to npm.

            ### Installation
            ```bash
            pnpm add @aigraphia/protocol @aigraphia/cli
            ```

            See [CHANGELOG.md](./CHANGELOG.md) for details.
          draft: false
          prerelease: false
